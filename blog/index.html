<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog | Traitora</title>
  <meta name="description" content="Artikel über Persönlichkeitspsychologie, Traits und adaptives Testing von Traitora.">

  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3654554314003005" crossorigin="anonymous"></script>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">

  <style>
    :root {
      --bg-primary: #0f0f1e;
      --bg-secondary: #1a1a2e;
      --bg-tertiary: #252542;
      --text-primary: #e4e4e7;
      --text-secondary: #a1a1aa;
      --accent-primary: #8b5cf6;
      --accent-secondary: #6366f1;
      --accent-gradient: linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%);
      --border-color: rgba(139,92,246,0.2);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
    }
    header {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      font-size: 22px;
      font-weight: 800;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-decoration: none;
    }
    header a.back {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 14px;
      transition: color .2s;
    }
    header a.back:hover { color: var(--accent-primary); }
    .hero {
      text-align: center;
      padding: 56px 24px 36px;
      background: linear-gradient(180deg, var(--bg-secondary) 0%, var(--bg-primary) 100%);
    }
    .hero h1 {
      font-size: 36px;
      font-weight: 800;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }
    .hero p { color: var(--text-secondary); font-size: 16px; }
    .filters {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      padding: 16px 24px;
      max-width: 900px;
      margin: 0 auto;
    }
    .filter-btn {
      padding: 7px 18px;
      border-radius: 20px;
      border: 1px solid var(--border-color);
      background: var(--bg-secondary);
      color: var(--text-secondary);
      font-size: 13px;
      cursor: pointer;
      transition: all .2s;
      font-family: inherit;
    }
    .filter-btn:hover { border-color: var(--accent-primary); color: var(--text-primary); }
    .filter-btn.active { background: var(--accent-primary); color: #fff; border-color: var(--accent-primary); }
    main { max-width: 900px; margin: 0 auto; padding: 24px; }
    #blog-loading, #blog-error, #blog-empty {
      text-align: center;
      padding: 64px 24px;
      color: var(--text-secondary);
      font-size: 15px;
    }
    .posts-grid { display: flex; flex-direction: column; gap: 20px; }
    .post-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 14px;
      padding: 24px 28px;
      transition: border-color .2s, transform .2s;
      cursor: pointer;
    }
    .post-card:hover { border-color: var(--accent-primary); transform: translateY(-2px); }
    .post-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
    .post-tag { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; background: rgba(139,92,246,.18); color: #c084fc; }
    .post-date { font-size: 12px; color: var(--text-secondary); }
    .post-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; color: var(--text-primary); line-height: 1.35; }
    .post-excerpt { font-size: 14px; color: var(--text-secondary); line-height: 1.65; }
    .post-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 1000; overflow-y: auto; padding: 24px; }
    .post-overlay.open { display: flex; align-items: flex-start; justify-content: center; }
    .post-full { background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 16px; max-width: 720px; width: 100%; padding: 36px 40px; margin: auto; position: relative; }
    .post-full-close { position: absolute; top: 16px; right: 16px; background: none; border: none; color: var(--text-secondary); font-size: 22px; cursor: pointer; line-height: 1; }
    .post-full-close:hover { color: var(--text-primary); }
    .post-full h2 { font-size: 26px; font-weight: 800; margin-bottom: 12px; }
    .post-full .post-body { font-size: 15px; line-height: 1.75; color: var(--text-secondary); margin-top: 20px; }
    .post-full .post-body p { margin-bottom: 14px; }
    .post-full .post-body h2, .post-full .post-body h3 { color: var(--text-primary); margin: 20px 0 8px; }
    .post-full .post-body ul, .post-full .post-body ol { padding-left: 22px; margin-bottom: 14px; }
    .post-full .post-body li { margin-bottom: 6px; }
    footer { text-align: center; padding: 32px 24px; color: var(--text-secondary); font-size: 13px; border-top: 1px solid var(--border-color); margin-top: 48px; }
    footer a { color: var(--text-secondary); text-decoration: none; }
    footer a:hover { color: var(--accent-primary); }
    footer .sep { margin: 0 8px; }
  </style>
</head>
<body>

<header>
  <a href="/de/" class="logo">Traitora</a>
  <a href="/de/" class="back">← Zum Test</a>
</header>

<div class="hero">
  <h1>📝 Blog</h1>
  <p>Artikel über Persönlichkeitspsychologie, Traits und adaptives Testing</p>
</div>

<div class="filters" id="filters">
  <button class="filter-btn active" data-tag="all">Alle</button>
</div>

<main>
  <div id="blog-loading">Lädt Artikel…</div>
  <div id="blog-error"   style="display:none">Fehler beim Laden. Bitte später versuchen.</div>
  <div id="blog-empty"   style="display:none">Noch keine Artikel veröffentlicht – komm bald wieder!</div>
  <div id="posts-grid"   class="posts-grid" style="display:none"></div>
</main>

<div class="post-overlay" id="postOverlay">
  <div class="post-full" id="postFull">
    <button class="post-full-close" onclick="closePost()">✕</button>
    <div id="postFullContent"></div>
  </div>
</div>

<footer>
  <a href="/impressum.html">Impressum</a>
  <span class="sep">·</span>
  <a href="/datenschutz.html">Datenschutz</a>
  <span class="sep">·</span>
  <a href="/de/">Traitora</a>
  <p style="margin-top:12px">© 2026 Traitora · powered by <a href="https://frame-sphere.vercel.app">FrameSphere</a></p>
</footer>

<script>
(function () {
  const HQ_API = 'https://webcontrol-hq-api.karol-paschek.workers.dev';
  const SITE_ID = 'traitora';
  let allPosts = [];

  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function fmtDate(d) { return new Date(d).toLocaleDateString('de-DE',{year:'numeric',month:'long',day:'numeric'}); }

  function renderPosts(tag) {
    const grid = document.getElementById('posts-grid');
    const empty = document.getElementById('blog-empty');
    const filtered = tag === 'all' ? allPosts : allPosts.filter(p => p.tags && p.tags.includes(tag));
    if (!filtered.length) { grid.style.display='none'; empty.style.display=''; return; }
    empty.style.display = 'none';
    grid.style.display = '';
    grid.innerHTML = filtered.map(p => `
      <div class="post-card" onclick="openPost(${p.id})">
        <div class="post-meta">
          ${p.tags ? p.tags.split(',').map(t=>t.trim()).filter(Boolean).map(t=>`<span class="post-tag">${esc(t)}</span>`).join('') : ''}
          <span class="post-date">${fmtDate(p.created_at)}</span>
        </div>
        <div class="post-title">${esc(p.title)}</div>
        ${p.excerpt ? `<div class="post-excerpt">${esc(p.excerpt)}</div>` : ''}
      </div>`).join('');
  }

  function buildFilters() {
    const tagSet = new Set();
    allPosts.forEach(p => { if (p.tags) p.tags.split(',').forEach(t => { const s=t.trim(); if(s) tagSet.add(s); }); });
    const container = document.getElementById('filters');
    tagSet.forEach(tag => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn'; btn.dataset.tag = tag; btn.textContent = tag;
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active'); renderPosts(tag);
      });
      container.appendChild(btn);
    });
    document.querySelector('.filter-btn[data-tag="all"]').addEventListener('click', function() {
      document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
      this.classList.add('active'); renderPosts('all');
    });
  }

  window.openPost = function(id) {
    const p = allPosts.find(x=>x.id===id); if (!p) return;
    const tags = p.tags ? p.tags.split(',').map(t=>t.trim()).filter(Boolean).map(t=>`<span class="post-tag">${esc(t)}</span>`).join('') : '';
    document.getElementById('postFullContent').innerHTML = `
      <div class="post-meta">${tags}<span class="post-date">${fmtDate(p.created_at)}</span></div>
      <h2>${esc(p.title)}</h2>
      <div class="post-body">${p.content||(p.excerpt?`<p>${esc(p.excerpt)}</p>`:'<p>Kein Inhalt verfügbar.</p>')}</div>`;
    document.getElementById('postOverlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  };
  window.closePost = function() {
    document.getElementById('postOverlay').classList.remove('open');
    document.body.style.overflow = '';
  };
  document.getElementById('postOverlay').addEventListener('click', e => { if(e.target===document.getElementById('postOverlay')) window.closePost(); });
  document.addEventListener('keydown', e => { if(e.key==='Escape') window.closePost(); });

  async function loadPosts() {
    try {
      const res = await fetch(`${HQ_API}/api/blog/published?site_id=${SITE_ID}`);
      if (!res.ok) throw new Error('HTTP '+res.status);
      allPosts = await res.json();
      document.getElementById('blog-loading').style.display = 'none';
      if (!allPosts.length) { document.getElementById('blog-empty').style.display=''; return; }
      buildFilters(); renderPosts('all');
    } catch(e) {
      document.getElementById('blog-loading').style.display = 'none';
      document.getElementById('blog-error').style.display = '';
    }
  }
  loadPosts();
})();
</script>
</body>
</html>
